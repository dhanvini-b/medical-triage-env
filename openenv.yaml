name: medical-triage-env
version: "1.0.0"
description: >
  A medical triage environment where an AI agent must assess patient
  symptoms, vitals, and history to assign the correct urgency level:
  emergency, urgent, or routine. Designed to evaluate clinical
  reasoning under uncertainty. Includes 9 patient templates across
  3 difficulty levels trained with GRPO.

author: dhanvini
tags: [medical, triage, healthcare, real-world]

tasks:
  - name: easy
    description: Classic emergency presentation. Chest pain, low BP, low SpO2.
    difficulty: easy
    max_steps: 1
    success_threshold: 0.7

  - name: medium
    description: Ambiguous fever and fatigue. Could be flu, dengue, or typhoid.
    difficulty: medium
    max_steps: 1
    success_threshold: 0.5

  - name: hard
    description: Atypical MI in elderly diabetic. Easy to miss, high stakes.
    difficulty: hard
    max_steps: 1
    success_threshold: 0.7

observation_space:
  patient_id: string
  age: integer
  symptoms: list[string]
  vitals:
    heart_rate: float
    bp_systolic: float
    bp_diastolic: float
    spo2: float
    temperature: float
  history: list[string]
  step_number: integer

action_space:
  triage_level: "emergency | urgent | routine"
  reasoning: string

reward:
  min: -0.3
  max: 1.0
  description: >
    0.7 for correct triage level. Negative reward (-0.3) for catastrophic
    under-triage (missing a true emergency). Up to 0.2 for reasoning quality
    based on symptoms and history referenced. 0.1 for format compliance.

entry_point: server:app
port: 7860
